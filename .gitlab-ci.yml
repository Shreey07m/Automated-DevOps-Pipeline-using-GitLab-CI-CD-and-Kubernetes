stages:
  - build
  - test
  - deploy
  - rollback

variables:
  IMAGE_NAME: devops-app

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $IMAGE_NAME:$CI_COMMIT_SHA .

test:
  stage: test
  image: python:3.10
  script:
    - echo "Running tests..."
    - pip install flask
    - python app.py &
    - sleep 5
    - curl http://localhost:3000/health

deploy_staging:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl apply -f deployment.yaml
    - kubectl apply -f service.yaml
  only:
    - dev

deploy_production:
  stage: deploy
  script:
    - echo "Deploying to PRODUCTION..."
  only:
    - prod

rollback:
  stage: rollback
  script:
    - echo "Rolling back deployment..."
    - kubectl rollout undo deployment/app
  when: manual
  only:
    - dev
    - prod